<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Formex3D</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b0b0f;
      color: #ffffff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .image-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .image-wrapper img {
      width: 100%;
      max-width: 1100px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .contact {
      margin-top: 40px;
      padding: 30px;
      background: #111119;
      border-radius: 16px;
      text-align: center;
    }

    .contact h2 {
      margin-bottom: 10px;
      font-weight: normal;
      letter-spacing: 1px;
    }

    .contact a {
      color: #c4a5ff;
      text-decoration: none;
      font-size: 18px;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .impressum {
      margin-top: 40px;
      font-size: 12px;
      color: #888;
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .contact {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Hauptbild -->
    <div class="image-wrapper">
      <img src="website.png" alt="Formex3D">
    </div>

    <!-- Kontakt -->
    <div class="contact">
      <h2>Kontakt</h2>
      <p>
        <a href="mailto:Kontakt@Formex3D.de">Kontakt@Formex3D.de</a>
      </p>
    </div>

    <!-- Impressum -->
    <div class="impressum">
      <p>
        Finn Schaper<br>
        Bürgermeister-Bock-Straße 1<br>
        31542 Bad Nenndorf<br><br>
        E-Mail: Kontakt@Formex3D.de
      </p>
      <p><strong>Umsatzsteuer-Identifikationsnummer gemäß § 27a UStG:</strong><br>
DE459951342</p>
    </div>

  </div>

</body>
</html>
